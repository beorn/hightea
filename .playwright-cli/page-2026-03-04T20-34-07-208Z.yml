            - generic [ref=e124]:
                - heading "CLI Wizards & Setup Tools Permalink to \"CLI Wizards & Setup Tools\"" [level=1] [ref=e125]:
                    - text: CLI Wizards & Setup Tools
                    - link "Permalink to \"CLI Wizards & Setup Tools\"" [ref=e126] [cursor=pointer]:
                        - /url: "#cli-wizards-setup-tools"
                        - text: "#"
                - paragraph [ref=e127]: Interactive CLI wizards guide users through multi-step configuration, installation, or setup flows. They combine selection prompts, text inputs, progress feedback, and branching logic into a single terminal experience. inkx provides the building blocks for all of this as first-class React components, so you can compose wizard steps the same way you compose any React UI.
                - heading "Why inkx Permalink to \"Why inkx\"" [level=2] [ref=e128]:
                    - text: Why inkx
                    - link "Permalink to \"Why inkx\"" [ref=e129] [cursor=pointer]:
                        - /url: "#why-inkx"
                        - text: "#"
                - paragraph [ref=e130]:
                    - text: Most terminal UI libraries force you to chain sequential
                    - code [ref=e131]: readline
                    - text: "prompts or shell out to separate prompt utilities. inkx takes a different approach: each wizard step is a React component with its own state, and transitions between steps are just state changes. You get full control over layout, focus, and rendering without leaving the React model."
                - heading "Key Benefits Permalink to \"Key Benefits\"" [level=2] [ref=e132]:
                    - text: Key Benefits
                    - link "Permalink to \"Key Benefits\"" [ref=e133] [cursor=pointer]:
                        - /url: "#key-benefits"
                        - text: "#"
                - list [ref=e134]:
                    - listitem [ref=e135]:
                        - paragraph [ref=e136]:
                            - strong [ref=e137]: SelectList component
                            - text: "-- Built-in single-select with keyboard navigation (arrow keys, j/k, Home/End), disabled item support, and automatic scroll windowing via"
                            - code [ref=e138]: maxVisible
                            - text: . No external prompt library needed.
                    - listitem [ref=e139]:
                        - paragraph [ref=e140]:
                            - strong [ref=e141]: TextInput
                            - text: "-- Text input that works out of the box with full readline shortcuts (Ctrl+A/E for Home/End, Ctrl+K/U for kill line, Alt+B/F for word movement, Ctrl+Y for yank, and a kill ring). Supports controlled and uncontrolled modes, placeholder text, and password masking."
                    - listitem [ref=e142]:
                        - paragraph [ref=e143]:
                            - strong [ref=e144]: ProgressBar and Spinner
                            - text: "-- Visual progress feedback during long operations."
                            - code [ref=e145]: ProgressBar
                            - text: supports both determinate (0-1 value) and indeterminate (animated bounce) modes with customizable fill characters and colors.
                            - code [ref=e146]: Spinner
                            - text: ships with four animation presets (dots, line, arc, bounce).
                    - listitem [ref=e147]:
                        - paragraph [ref=e148]:
                            - strong [ref=e149]: Focus scopes
                            - text: "-- Each wizard step can live inside a"
                            - code [ref=e150]: Box
                            - text: with
                            - code [ref=e151]: focusScope
                            - text: ", so Tab and arrow key navigation cycles within that step rather than leaking to the entire app. Enter a scope on step transition, exit it on Back. The focus system is tree-based and requires no manual wiring."
                    - listitem [ref=e152]:
                        - paragraph [ref=e153]:
                            - strong [ref=e154]: Static rendering
                            - text: "-- When the wizard finishes, use"
                            - code [ref=e155]: renderStatic()
                            - text: to produce pipe-friendly output with no cursor control sequences. Pass
                            - code [ref=e156]: "{ plain: true }"
                            - text: to strip ANSI codes entirely, making the output safe for redirection to files or other tools.
