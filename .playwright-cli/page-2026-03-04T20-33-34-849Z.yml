                - heading "What inkx Adds Permalink to \"What inkx Adds\"" [level=2] [ref=e298]:
                    - text: What inkx Adds
                    - link "Permalink to \"What inkx Adds\"" [ref=e299] [cursor=pointer]:
                        - /url: "#what-inkx-adds"
                        - text: "#"
                - paragraph [ref=e300]:
                    - text: Traditional TUI frameworks require manual width calculations for responsive panels. inkx's layout feedback lets components query their own dimensions — size progress bars, truncate text, and set responsive breakpoints without prop threading. The theming system provides consistent color tokens. Incremental rendering (200x+ faster than full-screen rewrites —
                    - link "benchmarks" [ref=e301] [cursor=pointer]:
                        - /url: /inkx/guide/why-inkx.html#performance
                    - text: ) eliminates visible flicker in dashboards that update multiple times per second. And synchronized output ensures multiplexers like tmux show complete frames.
