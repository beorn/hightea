                - heading "Dashboards & Monitoring Permalink to \"Dashboards & Monitoring\"" [level=1] [ref=e125]:
                    - text: Dashboards & Monitoring
                    - link "Permalink to \"Dashboards & Monitoring\"" [ref=e126] [cursor=pointer]:
                        - /url: "#dashboards-monitoring"
                        - text: "#"
                - paragraph [ref=e127]: Terminal dashboards are one of the most natural fits for inkx. A dashboard is a set of panels competing for screen space, each displaying different data that updates at different rates. The hard part is making panels responsive to the terminal size, updating frequently without flicker, and keeping the layout consistent across different terminal widths.
                - paragraph [ref=e128]: inkx solves all three problems out of the box. Components query their own dimensions, the incremental renderer only repaints changed cells, and flexbox layout handles the space allocation.
                - heading "Key Benefits Permalink to \"Key Benefits\"" [level=2] [ref=e129]:
                    - text: Key Benefits
                    - link "Permalink to \"Key Benefits\"" [ref=e130] [cursor=pointer]:
                        - /url: "#key-benefits"
                        - text: "#"
                - list [ref=e131]:
                    - listitem [ref=e132]:
                        - paragraph [ref=e133]:
                            - strong [ref=e134]: Layout feedback
                            - text: "--"
                            - code [ref=e135]: useContentRect()
                            - text: gives each panel its computed dimensions. Progress bars, sparklines, and data tables size themselves to fill available space. No manual width calculations, no prop threading.
                    - listitem [ref=e136]:
                        - paragraph [ref=e137]:
                            - strong [ref=e138]: Multi-pane layouts
                            - text: "-- Flexbox via"
                            - code [ref=e139]: Box
                            - text: with
                            - code [ref=e140]: flexDirection
                            - text: ","
                            - code [ref=e141]: flexGrow
                            - text: ", and percentage widths lets you compose arbitrary panel arrangements. Nest layouts freely: a sidebar next to a main area, each containing stacked sub-panels."
                    - listitem [ref=e142]:
                        - paragraph [ref=e143]:
                            - strong [ref=e144]: Real-time updates
                            - text: "-- inkx's incremental renderer tracks dirty flags per node. When one metric changes in a 1000-node dashboard, only that cell repaints — 169us per update vs 20.7ms for a full re-render ("
                            - link "benchmarks" [ref=e145] [cursor=pointer]:
                                - /url: /inkx/guide/why-inkx.html#performance
                            - text: ). Smooth 30fps data refreshes without saturating the terminal.
                    - listitem [ref=e146]:
                        - paragraph [ref=e147]:
                            - strong [ref=e148]: Theming
                            - text: "--"
                            - code [ref=e149]: ThemeProvider
                            - text: with semantic
                            - code [ref=e150]: $token
                            - text: colors (
                            - code [ref=e151]: $primary
                            - text: ","
                            - code [ref=e152]: $success
                            - text: ","
                            - code [ref=e153]: $error
                            - text: ","
                            - code [ref=e154]: $muted
                            - text: ","
                            - code [ref=e155]: $border
                            - text: ) gives your dashboard a consistent look. Switch between
                            - code [ref=e156]: defaultDarkTheme
                            - text: and
                            - code [ref=e157]: defaultLightTheme
                            - text: or define custom palettes.
                    - listitem [ref=e158]:
                        - paragraph [ref=e159]:
                            - strong [ref=e160]: Scrollback buffer
                            - text: "-- Log panels and event feeds grow over time."
                            - code [ref=e161]: overflow="scroll"
                            - text: "containers handle this natively: content accumulates, the viewport follows the latest entry, and users can scroll back through full history. No manual ring buffer or viewport tracking."
                    - listitem [ref=e162]:
                        - paragraph [ref=e163]:
                            - strong [ref=e164]: Synchronized output
                            - text: "-- DEC 2026 synchronized updates wrap each frame in atomic begin/end markers. Terminals that support the protocol (tmux, Zellij, Ghostty, WezTerm, kitty) paint the entire frame at once, eliminating the partial-repaint flicker that plagues fast-updating dashboards."
