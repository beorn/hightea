            - article [ref=e54]:
                - heading "Two-Layer Architecture" [level=2] [ref=e55]
                - paragraph [ref=e56]: Define 14 palette colors. Get 19 semantic tokens + a 16-color content palette via deriveTheme(). Clean separation between theme authoring and UI consumption.
            - article [ref=e59]:
                - heading "45 Built-in Themes" [level=2] [ref=e60]
                - paragraph [ref=e61]: Catppuccin, Nord, Dracula, Solarized, Tokyo Night, Gruvbox, Rose Pine, Kanagawa, and many more. Each hand-tuned for the ThemePalette format.
            - article [ref=e64]:
                - heading "Builder API" [level=2] [ref=e65]
                - paragraph [ref=e66]: Create themes from as little as one color. The builder generates surface ramps, accent hues, and semantic tokens automatically.
            - article [ref=e69]:
                - heading "Base16 Compatible" [level=2] [ref=e70]
                - paragraph [ref=e71]: Import any of the 600+ community Base16 schemes. Export your themes back to Base16 YAML for use in terminals, editors, and shells.
            - article [ref=e74]:
                - heading "CLI Included" [level=2] [ref=e75]
                - paragraph [ref=e76]: Browse themes, generate new ones, import/export Base16 — all from the command line with colorful terminal output.
            - article [ref=e79]:
                - heading "Zero Dependencies" [level=2] [ref=e80]
                - paragraph [ref=e81]: Pure TypeScript. No runtime dependencies. Works with any bundler, any runtime, any platform.
