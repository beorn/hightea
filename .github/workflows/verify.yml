name: Verify Publishable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "23"
      - run: npm install -g pnpm
      - run: bun install

      - name: Build
        run: npx tsdown -W

      - name: Verify packages
        run: |
          set -e
          verify_pkg() {
            local dir=$1
            local name=$(node -e "console.log(require('./$dir/package.json').name)")
            local private=$(node -e "const p=require('./$dir/package.json'); console.log(p.private || false)")
            if [ "$private" = "true" ]; then
              echo "⏭ $name (private)"
              return 0
            fi

            echo "📦 Verifying $name..."
            cd "$dir"
            pnpm pack 2>/dev/null
            local tgz=$(ls *.tgz 2>/dev/null | head -1)
            if [ -z "$tgz" ]; then
              echo "❌ pnpm pack produced no tarball"
              exit 1
            fi

            local tmpdir=$(mktemp -d)
            cd "$tmpdir"
            npm init -y --quiet 2>/dev/null
            npm install "$GITHUB_WORKSPACE/$dir/$tgz" --no-save 2>&1
            
            echo "  ✓ pack + install"
            
            if command -v bunx &>/dev/null; then
              bunx publint@latest "$GITHUB_WORKSPACE/$dir" 2>&1 || true
              echo "  ✓ publint"
            fi

            node -e "import('$name').then(m => console.log('  ✓ import:', Object.keys(m).slice(0,3).join(', ')))" 2>&1 || {
              echo "❌ import('$name') failed"
              exit 1
            }

            cd "$GITHUB_WORKSPACE"
            rm -rf "$tmpdir" "$dir"/$tgz
          }

          verify_pkg "."
          verify_pkg "packages/ansi"
          verify_pkg "packages/color"
          verify_pkg "packages/commander"
          verify_pkg "packages/examples"
