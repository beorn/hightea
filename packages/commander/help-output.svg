<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 500 330">
  <style>
    text {
      font-family: 'SFMono-Regular', 'Cascadia Code', 'Fira Code', Menlo, Consolas, monospace;
      font-size: 12.5px;
      fill: #cdd6f4;
    }
    .bold { font-weight: bold; }
    .cyan { fill: #89b4fa; }
    .green { fill: #a6e3a1; }
    .dim { fill: #6c7086; }
  </style>
  <rect width="500" height="330" rx="8" fill="#1e1e2e"/>
  <text xml:space="preserve" y="28" x="16"><tspan fill="#bac2de">$</tspan> deploy --help</text>
  <text xml:space="preserve" y="56" x="16"><tspan class="bold">Usage:</tspan> <tspan class="cyan">deploy</tspan> <tspan class="green">[options]</tspan> <tspan class="green">[command]</tspan></text>
  <text xml:space="preserve" y="78" x="16">Deploy services to an environment</text>
  <text xml:space="preserve" y="106" x="16" class="bold">Options:</text>
  <text xml:space="preserve" y="124" x="16">  <tspan class="green">-V, --version    </tspan> <tspan class="dim">output the version number</tspan></text>
  <text xml:space="preserve" y="142" x="16">  <tspan class="green">-e, --env &lt;env&gt;  </tspan> <tspan class="dim">Target environment</tspan></text>
  <text xml:space="preserve" y="160" x="16">  <tspan class="green">-f, --force      </tspan> <tspan class="dim">Skip confirmation</tspan></text>
  <text xml:space="preserve" y="178" x="16">  <tspan class="green">-v, --verbose    </tspan> <tspan class="dim">Verbose output</tspan></text>
  <text xml:space="preserve" y="196" x="16">  <tspan class="green">-h, --help       </tspan> <tspan class="dim">display help for command</tspan></text>
  <text xml:space="preserve" y="224" x="16" class="bold">Commands:</text>
  <text xml:space="preserve" y="242" x="16">  <tspan class="cyan">start</tspan> <tspan class="green">&lt;service&gt;</tspan>  <tspan class="dim">Start a service</tspan></text>
  <text xml:space="preserve" y="260" x="16">  <tspan class="cyan">stop</tspan> <tspan class="green">&lt;service&gt;</tspan>   <tspan class="dim">Stop a running service</tspan></text>
  <text xml:space="preserve" y="278" x="16">  <tspan class="cyan">status</tspan>            <tspan class="dim">Show service status</tspan></text>
  <text xml:space="preserve" y="296" x="16">  <tspan class="cyan">help</tspan> <tspan class="green">[command]</tspan>    <tspan class="dim">display help for command</tspan></text>
</svg>
